<!DOCTYPE html>
<html lang="en">
<head>

  <title>Cooking</title>

<body>
  <div class="main-layout">

    <aside class="sidebar">

          <label>

          <label><input type="checkbox" class="type-filter" value="appetizers" checked> Appetizers</label><br>
          <label><input type="checkbox" class="type-filter" value="drinks" checked> Drinks</label><br>

        </div>
      </div>

    <!-- Right: navigation + cards -->
    <main class="content">
      <!-- Navigation -->
      <nav>
        <a href="index.html">Home</a>
        <a href="cookin.html">Recipes</a>

        <a href="contact.html">Contact</a>
      </nav>

      <!-- Card container -->
      <div id="card-container" class="card-container">
        <!-- Card 1 -->
        <div class="card">
          <a href="recipe1.html">

          </a>
          <div class="card-content">
            <h3>Fresh Salad</h3>
            <p>Delicious and light salad for everyday use.</p>
            <a href="recipe1.html" class="btn green">Read more</a>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="card">
          <a href="recipe2.html">
            <img src="images/food/cocktail.jpg" alt="Drink">
          </a>
          <div class="card-content">
            <h3>Cold Drink</h3>

            <a href="recipe2.html" class="btn green">Read more</a>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="card">
          <img src="kartini/eda/snack.jpg" alt="Appetizer">
          <div class="card-content">
            <h3>Appetizer</h3>
            <p>Quick and delicious appetizer.</p>
            <a href="recipe3.html" class="btn green">Read more</a>
          </div>
        </div>

        <!-- You can add the remaining cards in the same way -->
      </div>
